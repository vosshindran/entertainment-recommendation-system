<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - Entertainment Recommendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/darkmode.css">
</head>

<body>
    <!-- Navbar injected by app.js -->

    <!-- Hero Section -->
    <header class="hero-container" id="hero-banner">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div id="hero-genres" class="mb-2"></div>
            <h1 class="hero-title" id="hero-title">Loading...</h1>
            <div id="hero-rating" class="mb-2 fs-5"></div>
            <p class="hero-overview" id="hero-overview"></p>
            <div class="d-flex gap-2">
                <button class="btn btn-primary px-4" id="hero-play">
                    <i class="bi bi-play-fill"></i> Play
                </button>
                <button class="btn btn-secondary px-4" id="hero-info">
                    <i class="bi bi-info-circle"></i> More Info
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Filter bar injected by main.js -->

        <section class="movie-row-container">
            <h2 class="movie-row-title">
                <i class="bi bi-fire text-warning me-2"></i>Trending Now
            </h2>
            <div class="movie-row" id="trending-row">
                <div class="loader"></div>
            </div>
        </section>

        <section class="movie-row-container">
            <h2 class="movie-row-title">
                <i class="bi bi-trophy-fill text-warning me-2"></i>Top Rated
            </h2>
            <div class="movie-row" id="top-rated-row">
                <div class="loader"></div>
            </div>
        </section>

        <section class="movie-row-container">
            <h2 class="movie-row-title">
                <i class="bi bi-lightning-fill me-2" style="color:var(--accent-color)"></i>Action Thrillers
            </h2>
            <div class="movie-row" id="action-row">
                <div class="loader"></div>
            </div>
        </section>

        <section class="movie-row-container mb-5">
            <h2 class="movie-row-title">
                <i class="bi bi-emoji-laughing-fill text-warning me-2"></i>Comedies
            </h2>
            <div class="movie-row" id="comedy-row">
                <div class="loader"></div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
