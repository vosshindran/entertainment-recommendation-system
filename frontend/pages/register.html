<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - StreamFlix</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
</head>

<body class="bg-dark text-white">

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="col-lg-4 col-md-6 col-sm-10">

            <div class="card bg-dark text-white shadow-lg border-0 p-4">

                <h3 class="text-center mb-4 fw-bold">Create Account</h3>

                <form id="register-form">

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm-password" required>
                    </div>

                    <!-- Button -->
                    <button type="submit" class="btn btn-success w-100 mt-3">
                        Register
                    </button>

                    <!-- Footer -->
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            Already have an account?
                            <a href="login.html" class="text-decoration-none text-info">Login</a>
                        </small>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>

</body>

</html>
