<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>body { padding-top: 100px; }</style>
</head>
<body>
    <div class="container animate-fade-in">
        <h2 class="mb-4">My Reviews</h2>
        
        <div id="reviews-list">
            <!-- Reviews injected here -->
        </div>

        <div id="empty-state" class="text-center mt-5 d-none">
            <i class="bi bi-chat-square-text display-1 text-muted mb-3"></i>
            <h4 class="text-muted">You haven't written any reviews yet.</h4>
            <a href="../index.html" class="btn btn-primary mt-3">Find a Movie to Review</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = storage.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const allReviews = storage.getReviews();
            let hasReviews = false;
            const container = document.getElementById('reviews-list');
            
            for (const movieId in allReviews) {
                const userReviews = allReviews[movieId].filter(r => r.author === user.username);
                if (userReviews.length > 0) {
                    hasReviews = true;
                    // We'd ideally fetch the movie title here, but we can display the review with a link
                    const movieHTML = userReviews.map(r => `
                        <div class="glass-panel mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5><a href="movie.html?id=${movieId}" class="text-decoration-none text-white">Movie ID: ${movieId}</a></h5>
                                <span class="text-muted small">${r.date}</span>
                            </div>
                            <div class="mb-2 text-warning">
                                ${'<i class="bi bi-star-fill"></i>'.repeat(r.rating)}
                                ${'<i class="bi bi-star"></i>'.repeat(5 - r.rating)}
                            </div>
                            <p class="mb-0 text-white">${r.text}</p>
                        </div>
                    `).join('');
                    container.innerHTML += movieHTML;
                }
            }

            if (!hasReviews) {
                document.getElementById('empty-state').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
