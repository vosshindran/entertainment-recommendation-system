<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>
        body { padding-top: 80px; }

        /* Page header */
        .rec-header {
            padding: 48px 5% 32px;
        }
        .rec-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .rec-header p {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0;
        }

        /* Genre pills */
        .genre-section {
            padding: 0 5% 40px;
        }
        .genre-section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }
        .genre-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .genre-pill {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-color);
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }
        .genre-pill:hover,
        .genre-pill.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
            transform: translateY(-2px);
        }

        /* Divider between sections */
        .section-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.07);
            margin: 0 5% 40px;
        }

        /* Explore section header */
        .explore-header {
            padding: 0 5%;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .explore-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }
        .explore-header .genre-label {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* Explore grid */
        .explore-grid-wrap {
            padding: 0 5% 60px;
        }
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        .explore-grid .movie-card {
            width: 100%;
        }

        /* Empty / guest state */
        .guest-box {
            margin: 0 5% 40px;
            padding: 48px 32px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            text-align: center;
        }
        .guest-box i {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 16px;
            display: block;
        }
        .guest-box h4 { font-weight: 700; margin-bottom: 8px; }
        .guest-box p { color: var(--text-muted); margin-bottom: 20px; }
    </style>
</head>
<body>
    <!-- Navbar injected by app.js -->

    <!-- Page header -->
    <div class="rec-header">
        <h1>Made For You</h1>
        <p id="rec-subtitle">Recommendations based on what you've saved</p>
    </div>

    <!-- Personalised rows (logged-in users) -->
    <div id="for-you-loader" class="loader"></div>
    <div id="for-you-rows"></div>

    <!-- Guest / empty state -->
    <div id="guest-box" class="guest-box d-none">
        <i class="bi bi-bookmark-heart"></i>
        <h4>Nothing here yet</h4>
        <p>Save movies to your watchlist and we'll build recommendations around your taste.</p>
        <a href="search.html" class="btn btn-primary">Find something to save</a>
    </div>

    <!-- Your Genres pills -->
    <div id="genre-section" class="genre-section d-none">
        <p class="genre-section-title">Your Genres</p>
        <div id="genre-pills" class="genre-pills"></div>
    </div>

    <hr class="section-divider">

    <!-- Explore by genre -->
    <div class="explore-header">
        <h2>Explore</h2>
        <span id="explore-genre-label" class="genre-label"></span>
    </div>
    <div id="explore-loader" class="loader d-none"></div>
    <div class="explore-grid-wrap">
        <div id="explore-grid" class="explore-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/recommendation.js"></script>
</body>
</html>
