<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>
        body { padding-top: 100px; }
        .genre-btn {
            margin: 0 10px 15px 0;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container animate-fade-in">
        <h2 class="mb-4">Discover Recommendations</h2>
        
        <div id="genres-container" class="mb-5">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
        </div>

        <h4 id="current-genre-title" class="mb-4 d-none">Showing: <span></span></h4>
        
        <div id="loader" class="loader d-none"></div>
        <div id="movies-grid" class="movie-grid">
            <!-- Movies injected here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    
    <!-- Page Specific Logic -->
    <script src="../js/recommendation.js"></script>
</body>
</html>
