<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>
        body { padding-top: 100px; }
        .profile-avatar {
            font-size: 5rem;
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container animate-fade-in">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="glass-panel text-center">
                    <i class="bi bi-person-circle profile-avatar mb-3 d-block"></i>
                    <h2 class="mb-1" id="profile-name">User</h2>
                    <p class="text-muted mb-4">Member since <span id="profile-date"></span></p>

                    <div class="row text-center mt-4 border-top border-secondary pt-4">
                        <div class="col-6">
                            <h3 id="watchlist-count">0</h3>
                            <p class="text-muted text-uppercase small">Watchlist Items</p>
                        </div>
                        <div class="col-6 border-start border-secondary">
                            <h3 id="reviews-count">0</h3>
                            <p class="text-muted text-uppercase small">Total Reviews</p>
                            <a href="reviews.html" class="btn btn-sm btn-outline-primary mt-2">View My Reviews</a>
                        </div>
                    </div>

                    <div class="mt-5">
                        <button class="btn btn-danger" onclick="handleLogout()">Sign Out</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = storage.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('profile-name').textContent = user.username;
            document.getElementById('profile-date').textContent = new Date(user.loggedInAt).toLocaleDateString();

            const watchlist = storage.getWatchlist();
            document.getElementById('watchlist-count').textContent = watchlist.length;

            const allReviews = storage.getReviews();
            let reviewCount = 0;
            for(const movieId in allReviews) {
                reviewCount += allReviews[movieId].length;
            }
            document.getElementById('reviews-count').textContent = reviewCount;
        });
    </script>
</body>
</html>
