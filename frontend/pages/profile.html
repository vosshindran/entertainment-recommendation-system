<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - StreamFlix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/darkmode.css" />
    <style>
      body {
        padding-top: 100px;
      }
      .profile-avatar {
        font-size: 5rem;
        color: var(--accent-color);
      }
    </style>
  </head>
  <body>
    <div class="container animate-fade-in">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="glass-panel text-center">
            <i class="bi bi-person-circle profile-avatar mb-3 d-block"></i>
            <h2 class="mb-1" id="profile-name">User</h2>
            <p class="text-muted mb-4">
              Member since <span id="profile-date"></span>
            </p>

            <div class="row text-center mt-4 border-top border-secondary pt-4">
              <div class="col-6">
                <h3 id="watchlist-count">0</h3>
                <p class="text-muted text-uppercase small">Watchlist Items</p>
              </div>
              <div class="col-6 border-start border-secondary">
                <h3 id="reviews-count">0</h3>
                <p class="text-muted text-uppercase small">Total Reviews</p>
              </div>
            </div>

            <div class="row mt-4 g-3">
              <div class="glass-panel col-md-4">
                <h6 class="fs-6 mb-3">Latest Watchlist Movie</h6>
                <div id="latest-watchlist-movie-container" class="text-center">
                  <p class="text-muted">No movies added yet.</p>
                </div>
              </div>
              <div class="glass-panel col-md-4">
                <h6 class="fs-6 mb-3">Latest Review</h6>
                <div id="latest-review-container" class="text-center">
                  <p class="text-muted">No reviews added yet.</p>
                </div>
              </div>
              <div class="glass-panel col-md-4">
                <h6 class="fs-6 mb-3">Top Rated Watchlist Movie</h6>
                <div
                  id="top-rated-watchlist-movie-container"
                  class="text-center"
                >
                  <p class="text-muted">No movies added yet.</p>
                </div>
              </div>
            </div>
            <div class="mt-5 border-top border-secondary pt-4 text-center">
              <div class="d-flex justify-content-center gap-3 flex-wrap mb-4">
                <a href="watchlist.html" class="btn btn-outline-primary px-4">
                  <i class="bi bi-bookmark-fill me-1"></i>
                  View Watchlist
                </a>

                <a href="reviews.html" class="btn btn-outline-primary px-4">
                  <i class="bi bi-star-fill me-1"></i>
                  View My Reviews
                </a>

                <a
                  href="recommendations.html"
                  class="btn btn-outline-primary px-4"
                >
                  <i class="bi bi-magic me-1"></i>
                  Find Recommendations
                </a>
              </div>
              <button class="btn btn-danger" onclick="handleLogout()">
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>

    <!-- Page Specific Logic -->
    <script src="../js/profile.js"></script>
  </body>
</html>
