<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StreamFlix</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
</head>

<body class="bg-dark text-white">

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="col-lg-4 col-md-6 col-sm-10">

            <div class="card bg-dark text-white shadow-lg border-0 p-4">

                <h3 class="text-center mb-4 fw-bold">Sign In</h3>

                <form id="login-form">

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label">Username / Email</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <!-- Button -->
                    <button type="submit" class="btn btn-primary w-100 mt-3">
                        Sign In
                    </button>

                    <!-- Footer -->
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            New here?
                            <a href="register.html" class="text-decoration-none text-info">Create account</a>
                        </small>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>

</body>

</html>
