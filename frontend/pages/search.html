<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>body { padding-top: 100px; }</style>
</head>
<body>
    <div class="container animate-fade-in">
        <h2 class="mb-4">Search Results for "<span id="search-query"></span>"</h2>
        <div id="loader" class="loader"></div>
        <div id="results-grid" class="movie-grid">
            <!-- Results injected here -->
        </div>
        <div id="no-results" class="text-center d-none mt-5">
            <h4 class="text-muted">No movies found. Try a different search.</h4>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    
    <!-- Page Specific Logic -->
    <script src="../js/search.js"></script>
</body>
</html>
