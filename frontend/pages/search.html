<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>body { padding-top: 100px; }</style>
</head>
<body>
    <div class="container animate-fade-in">
        <h2 class="mb-4">Search Results for "<span id="search-query"></span>"</h2>
        <div id="loader" class="loader"></div>
        <div id="results-grid" class="movie-grid">
            <!-- Results injected here -->
        </div>
        <div id="no-results" class="text-center d-none mt-5">
            <h4 class="text-muted">No movies found. Try a different search.</h4>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('q');
            
            if (!query) {
                document.getElementById('search-query').textContent = '...';
                document.getElementById('loader').classList.add('d-none');
                return;
            }

            document.getElementById('search-query').textContent = query;

            try {
                const data = await api.searchMovies(query);
                document.getElementById('loader').classList.add('d-none');

                if (data && data.results && data.results.length > 0) {
                    const grid = document.getElementById('results-grid');
                    grid.innerHTML = data.results.map(movie => window.createMovieCard(movie)).join('');
                } else {
                    document.getElementById('no-results').classList.remove('d-none');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loader').classList.add('d-none');
                document.getElementById('no-results').innerHTML = '<h4 class="text-danger">Error fetching results.</h4>';
                document.getElementById('no-results').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
