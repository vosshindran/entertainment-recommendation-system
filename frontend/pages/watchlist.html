<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist - StreamFlix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/darkmode.css">
    <style>body { padding-top: 120px; }</style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-1">
                <h1 class="mb-0">My Watchlist</h1>
                 <p class="mb-0 text-muted">All your favourite movies in one place</p>
        </div>
        <br>
        <p id="watchlist-count" class="mb-0 text-muted fs-6">0 Movie Results</p>
        <br>

        <div id="movies-grid" class="movie-grid">
            <!-- Watchlist injected here -->
        </div>

        <div id="empty-state" class="text-center mt-5 d-none">
            <i class="bi bi-bookmark-x display-1 text-muted mb-3"></i>
            <h4 class="text-muted">Your watchlist is empty.</h4>
            <a href="../index.html" class="btn btn-primary mt-3">Discover Movies</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
    
    <!-- Page Specific Logic -->
    <script src="../js/watchlist.js"></script>
</body>
</html>
